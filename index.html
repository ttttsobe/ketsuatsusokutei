<!DOCTYPE html>
<html>
<head>
<meta name="viewport"
      content="width=device-width, initial-scale=1">

<style>

body{
    background:#111;
    color:white;
    font-family:sans-serif;
    text-align:center;
    padding:20px;
}

video{
    width:95%;
    border-radius:20px;
    margin-top:20px;
}

#bpm{
    font-size:40px;
    margin-top:30px;
}

#bp{
    font-size:64px;
    font-weight:bold;
    margin-top:20px;
}

</style>
</head>

<body>

<h1>指をカメラに置いてください</h1>

<video id="video"
       autoplay
       playsinline></video>

<canvas id="canvas"
        style="display:none"></canvas>

<div id="bpm">BPM: --</div>

<div id="bp">120 / 80</div>

<script>

const video =
    document.getElementById("video");

const canvas =
    document.getElementById("canvas");

const ctx =
    canvas.getContext("2d");

const bpmText =
    document.getElementById("bpm");

const bpText =
    document.getElementById("bp");

let samples = [];

async function startCamera(){

    const stream =
        await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:{
                    ideal:"environment"
                }
            }
        });

    video.srcObject = stream;

    setInterval(analyzeFrame, 100);
}

function analyzeFrame(){

    if(video.videoWidth === 0) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    const frame =
        ctx.getImageData(
            0,
            0,
            canvas.width,
            canvas.height
        );

    let redTotal = 0;

    for(let i=0; i<frame.data.length; i += 4){

        redTotal += frame.data[i];
    }

    const avg =
        redTotal /
        (frame.data.length / 4);

    samples.push(avg);

    if(samples.length > 120){
        samples.shift();
    }

    calculate();
}

function calculate(){

    if(samples.length < 30) return;

    const mean =
        samples.reduce((a,b)=>a+b,0)
        / samples.length;

    let peaks = 0;

    for(let v of samples){

        if(v > mean + 2){
            peaks++;
        }
    }

    const bpm =
        Math.max(50,
        Math.min(140, peaks * 5));

    bpmText.innerText =
        "BPM: " + bpm;

    const sys =
        Math.round(
            110 + (bpm - 70) * 0.6
        );

    const dia =
        Math.round(
            70 + (bpm - 70) * 0.35
        );

    bpText.innerText =
        sys + " / " + dia;
}

startCamera();

</script>

</body>
</html>
