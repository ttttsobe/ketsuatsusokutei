<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>血圧測定v1.8</title>

<style>

body{
    margin:0;

    background:
        linear-gradient(
            180deg,
            #dff6ff 0%,
            #bfe9ff 50%,
            #a6dcff 100%
        );

    color:#1a1a1a;

    font-family:sans-serif;

    text-align:center;

    min-height:100vh;
}

.container{
    padding:20px;
}

button{
    font-size:16px;
    padding:14px 28px;
    border:none;
    border-radius:16px;
    background:#ff3b30;
    color:white;
    margin-top:20px;
}

video{
    width:100px;
    height:100px;

    object-fit:cover;

    border-radius:50px;

    margin-top:20px;

    background:black;

    box-shadow:
        0 0 30px rgba(255,0,0,0.5);
}

canvas{
    width:90%;
    height:70px;
    background:#FFFFFF;
    border-radius:16px;
    margin-top:20px;
}

#timer{
    font-size:40px;
    margin-top:20px;
}

#bpm{
    font-size:20px;
    margin-top:20px;
}

#bp{
    font-size:30px;
    font-weight:bold;
    margin-top:20px;
}

.small{
    font-size:20px;
    margin-top:20px;
    color:#1a1a1a;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="container">

    <h1>血圧測定v1.8</h1>

    <div id="startScreen">

        <p>
            背面カメラに指を密着してください
        </p>

        <button onclick="prepareCamera()">
            カメラ起動
        </button>

    </div>

    <div id="measureScreen"
         class="hidden">

        <div id="timer">
            30
        </div>

        <video id="video"
               autoplay
               playsinline></video>

        <br>

        <button id="realStartButton"
                onclick="beginMeasurement()"
                style="display:none;">
            この状態で計測開始
        </button>

        <canvas id="wave"></canvas>

        <div id="bpm">
            脈拍（現在の瞬間値）: --
        </div>

        <div id="bp">
            -- / --
        </div>

        <div class="small">

            最高血圧:
            <span id="sysText">--</span>

            <br>

            最低血圧:
            <span id="diaText">--</span>

            <br>

            脈拍:
            <span id="pulseText">--</span>

        </div>

        <button id="retryButton"
                onclick="location.reload()"
                style="
                    display:none;
                    background:#34c759;
                ">
            もう一度測定
        </button>

    </div>

</div>

<script>

const startScreen =
    document.getElementById("startScreen");

const measureScreen =
    document.getElementById("measureScreen");

const video =
    document.getElementById("video");

const waveCanvas =
    document.getElementById("wave");

const waveCtx =
    waveCanvas.getContext("2d");

const bpmText =
    document.getElementById("bpm");

const bpText =
    document.getElementById("bp");

const timerText =
    document.getElementById("timer");

const sysText =
    document.getElementById("sysText");

const diaText =
    document.getElementById("diaText");

const pulseText =
    document.getElementById("pulseText");

let stream = null;

let samples = [];

let timer = 30;

let interval = null;

let sysValues = [];

let diaValues = [];

let bpmValues = [];


// カメラ起動
async function prepareCamera(){

    startScreen.classList.add("hidden");

    measureScreen.classList.remove("hidden");

    stream =
        await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:{
                    ideal:"environment"
                },
                width:{ ideal:640 },
                height:{ ideal:480 },
                frameRate:{ ideal:30 }
            }
        });

    video.srcObject = stream;

    const track =
        stream.getVideoTracks()[0];

    try{

        const capabilities =
            track.getCapabilities();

        if(capabilities.torch){

            await track.applyConstraints({
                advanced:[
                    {torch:true}
                ]
            });
        }

        if(capabilities.zoom){

            const minZoom =
                capabilities.zoom.min || 1;

            await track.applyConstraints({
                advanced:[
                    {
                        zoom:minZoom
                    }
                ]
            });
        }

    }catch(e){

        console.log(e);
    }

    document.getElementById(
        "realStartButton"
    ).style.display =
        "inline-block";
}


// 本計測開始
function beginMeasurement(){

    timer = 30;

    timerText.innerText =
        timer;

    samples = [];

    sysValues = [];

    diaValues = [];

    bpmValues = [];

    interval =
        setInterval(analyzeFrame,40);

    startTimer();

    document.getElementById(
        "realStartButton"
    ).style.display =
        "none";
}


// タイマー
function startTimer(){

    const countdown =
        setInterval(()=>{

            timer--;

            timerText.innerText =
                timer;

            if(timer <= 0){

                clearInterval(countdown);

                stopMeasurement();
            }

        },1000);
}


// 測定終了
function stopMeasurement(){

    clearInterval(interval);

    if(stream){

        stream.getTracks().forEach(track=>{
            track.stop();
        });
    }

    video.srcObject = null;

    timerText.innerText =
        "測定完了";

    const finalSys =
        Math.round(
            sysValues.reduce((a,b)=>a+b,0)
            / sysValues.length
        );

    const finalDia =
        Math.round(
            diaValues.reduce((a,b)=>a+b,0)
            / diaValues.length
        );

    const finalPulse =
        Math.round(
            bpmValues.reduce((a,b)=>a+b,0)
            / bpmValues.length
        );

    bpText.innerText =
        finalSys + " / " + finalDia;

    sysText.innerText =
        finalSys;

    diaText.innerText =
        finalDia;

    pulseText.innerText =
        finalPulse;

    document.getElementById(
        "retryButton"
    ).style.display =
        "inline-block";
}


// フレーム解析
function analyzeFrame(){

    if(video.videoWidth === 0) return;

    waveCanvas.width =
        waveCanvas.clientWidth;

    waveCanvas.height =
        waveCanvas.clientHeight;

    const tempCanvas =
        document.createElement("canvas");

    tempCanvas.width =
        video.videoWidth;

    tempCanvas.height =
        video.videoHeight;

    const tempCtx =
        tempCanvas.getContext("2d");

    tempCtx.drawImage(video,0,0);

    const size = 180;

    const x =
        (tempCanvas.width / 2)
        - (size / 2);

    const y =
        (tempCanvas.height / 2)
        - (size / 2);

    const frame =
        tempCtx.getImageData(
            x,
            y,
            size,
            size
        );

    let redTotal = 0;

    for(let i=0; i<frame.data.length; i+=4){

        redTotal += frame.data[i];
    }

    const avg =
        redTotal /
        (frame.data.length / 4);

    // 指未接触
    if(avg < 120){
        return;
    }

    // 急変除外
    if(
        samples.length > 0 &&
        Math.abs(
            avg -
            samples[samples.length - 1]
        ) > 30
    ){
        return;
    }

    samples.push(avg);

    // smoothing
    if(samples.length > 3){

        const smooth =
            (
                samples[samples.length-1] +
                samples[samples.length-2] +
                samples[samples.length-3]
            ) / 3;

        samples[samples.length-1] =
            smooth;
    }

    if(samples.length > 200){
        samples.shift();
    }

    calculate();

    drawWave();
}


// BPM計算
function calculate(){

    // 最初5秒無視
    if(samples.length < 120){
        return;
    }

    const mean =
        samples.reduce((a,b)=>a+b,0)
        / samples.length;

    let peaks = [];

    for(let i=1; i<samples.length-1; i++){

        if(
            samples[i] > mean + 0.2 &&
            samples[i] > samples[i-1] &&
            samples[i] > samples[i+1]
        ){

            if(
                peaks.length === 0 ||
                i - peaks[peaks.length - 1] > 1
            ){
                peaks.push(i);
            }
        }
    }

    let bpm =
        Math.round(peaks.length * 6.8);

    bpm =
        Math.max(
            55,
            Math.min(140,bpm)
        );

    bpmText.innerText =
        "BPM: " + bpm;

    bpmValues.push(bpm);

    let sys =
        Math.round(
            118 + (bpm - 70) * 0.5
        );

    let dia =
        Math.round(
            67 + (bpm - 70) * 0.3
        );

    sysValues.push(sys);

    diaValues.push(dia);
}


// 波形描画
function drawWave(){

    waveCtx.clearRect(
        0,
        0,
        waveCanvas.width,
        waveCanvas.height
    );

    if(samples.length < 2){
        return;
    }

    waveCtx.beginPath();

    const max =
        Math.max(...samples);

    const min =
        Math.min(...samples);

    samples.forEach((v,i)=>{

        const x =
            i *
            (waveCanvas.width / samples.length);

        const y =
            waveCanvas.height -
            (
                (v - min) /
                (max - min + 0.0001)
            ) *
            waveCanvas.height;

        if(i===0){

            waveCtx.moveTo(x,y);

        }else{

            waveCtx.lineTo(x,y);
        }
    });

    waveCtx.strokeStyle =
        "#00ff88";

    waveCtx.lineWidth = 3;

    waveCtx.stroke();
}

</script>

</body>
</html>
