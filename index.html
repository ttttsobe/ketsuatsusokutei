<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>血圧測定</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

.container{
    padding:20px;
}

button{
    font-size:24px;
    padding:16px 32px;
    border:none;
    border-radius:16px;
    background:#ff3b30;
    color:white;
    margin-top:20px;
}

video{
    width:120px;
    border-radius:20px;
    margin-top:20px;
}

canvas{
    width:90%;
    height:180px;
    background:#000;
    border-radius:16px;
    margin-top:20px;
}

#timer{
    font-size:48px;
    margin-top:20px;
}

#bpm{
    font-size:42px;
    margin-top:20px;
}

#bp{
    font-size:64px;
    font-weight:bold;
    margin-top:10px;
}

.small{
    font-size:24px;
    margin-top:10px;
    color:#aaa;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="container">

    <h1>血圧測定</h1>

    <div id="startScreen">

        <p>
            カメラに指を密着してください
        </p>

        <button onclick="startMeasurement()">
            計測開始
        </button>

    </div>

    <div id="measureScreen"
         class="hidden">

        <div id="timer">
            20
        </div>

        <video id="video"
               autoplay
               playsinline></video>

        <canvas id="wave"></canvas>

        <div id="bpm">
            BPM: --
        </div>

        <div id="result">

    <div id="bp">
        -- / --
    </div>

    <div class="small">

        最高血圧:
        <span id="sysText">--</span>

        <br>

        最低血圧:
        <span id="diaText">--</span>

        <br>

        脈拍:
        <span id="pulseText">--</span>

    </div>

</div>

    </div>

</div>

<script>

const startScreen =
    document.getElementById("startScreen");

const measureScreen =
    document.getElementById("measureScreen");

const video =
    document.getElementById("video");

const waveCanvas =
    document.getElementById("wave");

const waveCtx =
    waveCanvas.getContext("2d");

const bpmText =
    document.getElementById("bpm");

const bpText =
    document.getElementById("bp");

const sysText =
    document.getElementById("sysText");

const diaText =
    document.getElementById("diaText");

const pulseText =
    document.getElementById("pulseText");

const timerText =
    document.getElementById("timer");

const minmaxText =
    document.getElementById("minmax");

let stream = null;

let samples = [];

let timer = 20;

let interval = null;

let sysValues = [];

let diaValues = [];
let bpmValues = [];

async function startMeasurement(){

    startScreen.classList.add("hidden");

    measureScreen.classList.remove("hidden");

    stream =
        await navigator.mediaDevices.getUserMedia({
            video:{
    facingMode:{
        ideal:"environment"
    },
    width:{ ideal:1280 },
    height:{ ideal:720 },
    frameRate:{ ideal:30 }
}
        });

    video.srcObject = stream;

    // Torch ON
    const track =
        stream.getVideoTracks()[0];

    const capabilities =
        track.getCapabilities();
        if(capabilities.zoom){

    try{

        await track.applyConstraints({
            advanced:[
                {zoom:1.0}
            ]
        });

    }catch(e){
        console.log(e);
    }
}

    if(capabilities.torch){

        try{

            await track.applyConstraints({
                advanced:[
                    {torch:true}
                ]
            });

        }catch(e){
            console.log(e);
        }
    }

    interval =
        setInterval(analyzeFrame, 40);

    startTimer();
}

function startTimer(){

    const countdown =
        setInterval(()=>{

            timer--;

            timerText.innerText = timer;

            if(timer <= 0){

                clearInterval(countdown);

                stopMeasurement();
            }

        },1000);
}

function stopMeasurement(){

    clearInterval(interval);

    if(stream){

        stream.getTracks().forEach(track=>{
            track.stop();
        });
    }

    video.srcObject = null;

    timerText.innerText = "測定完了";

    // 平均化
    const finalSys =
        Math.round(
            sysValues.reduce((a,b)=>a+b,0)
            / sysValues.length
        );

    const finalDia =
        Math.round(
            diaValues.reduce((a,b)=>a+b,0)
            / diaValues.length
        );

    const finalPulse =
        Math.round(
            bpmValues.reduce((a,b)=>a+b,0)
            / bpmValues.length
        );

    bpText.innerText =
        finalSys + " / " + finalDia;

    sysText.innerText =
        finalSys;

    diaText.innerText =
        finalDia;

    pulseText.innerText =
        finalPulse;
}

function analyzeFrame(){

    if(video.videoWidth === 0) return;

    waveCanvas.width =
        waveCanvas.clientWidth;

    waveCanvas.height =
        waveCanvas.clientHeight;

    const tempCanvas =
        document.createElement("canvas");

    tempCanvas.width =
        video.videoWidth;

    tempCanvas.height =
        video.videoHeight;

    const tempCtx =
        tempCanvas.getContext("2d");

    tempCtx.drawImage(video,0,0);

    const size = 150;

const x =
    (tempCanvas.width / 2)
    - (size / 2);

const y =
    (tempCanvas.height / 2)
    - (size / 2);

const frame =
    tempCtx.getImageData(
        x,
        y,
        size,
        size
    );

    let redTotal = 0;

    for(let i=0; i<frame.data.length; i+=4){

        redTotal += frame.data[i];
    }

    const avg =
    redTotal /
    (frame.data.length / 4);

// 指がちゃんと置かれてない時は無視
if(avg < 120){
    return;
}

samples.push(avg);
    if(samples.length > 3){

    const smooth =
        (
            samples[samples.length-1] +
            samples[samples.length-2] +
            samples[samples.length-3]
        ) / 3;

    samples[samples.length-1] =
        smooth;
}

    if(samples.length > 200){
        samples.shift();
    }

    calculate();
    drawWave();
}

function calculate(){

    if(samples.length < 30) return;

    const mean =
        samples.reduce((a,b)=>a+b,0)
        / samples.length;

    let peaks = [];

for(let i=1; i<samples.length-1; i++){

    if(
        samples[i] > mean + 1.2 &&
        samples[i] > samples[i-1] &&
        samples[i] > samples[i+1]
    ){

        // 近すぎるピークを除外
        if(
            peaks.length === 0 ||
            i - peaks[peaks.length - 1] > 5
        ){
            peaks.push(i);
        }
    }
}

// 20秒ベース換算
let bpm =
    peaks.length * 6;

    bpm =
        Math.max(55,
        Math.min(140,bpm));

    bpmText.innerText =
        "BPM: " + bpm;
      bpmValues.push(bpm);

    let sys =
    Math.round(
        116 + (bpm - 70) * 0.45
    );

let dia =
    Math.round(
        65 + (bpm - 70) * 0.25
    );

    sysValues.push(sys);
    diaValues.push(dia);

    const minSys =
        Math.min(...sysValues);

    const maxSys =
        Math.max(...sysValues);

    const minDia =
        Math.min(...diaValues);

    const maxDia =
        Math.max(...diaValues);

    bpText.innerText =
        sys + " / " + dia;

    minmaxText.innerHTML =
        `
        MIN: ${minSys}/${minDia}
        <br>
        MAX: ${maxSys}/${maxDia}
        `;
}

function drawWave(){

    waveCtx.clearRect(
        0,
        0,
        waveCanvas.width,
        waveCanvas.height
    );

    waveCtx.beginPath();

    const max =
        Math.max(...samples);

    const min =
        Math.min(...samples);

    samples.forEach((v,i)=>{

        const x =
            i *
            (waveCanvas.width / samples.length);

        const y =
            waveCanvas.height -
            (
                (v - min) /
                (max - min)
            ) *
            waveCanvas.height;

        if(i===0){
            waveCtx.moveTo(x,y);
        }else{
            waveCtx.lineTo(x,y);
        }
    });

    waveCtx.strokeStyle =
        "#00ff88";

    waveCtx.lineWidth = 3;

    waveCtx.stroke();
}

</script>

</body>
</html>
